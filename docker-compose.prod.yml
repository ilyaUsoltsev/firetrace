services:
  server:
    build: ./server
    depends_on:
      - postgres
      - migrate
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/firefly
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:80"

volumes:
  postgres_data:
