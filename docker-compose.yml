services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: firefly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  migrate:
    image: ghcr.io/amacneil/dbmate:latest
    depends_on:
      - postgres
    volumes:
      - ./db:/db
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/firefly?sslmode=disable
    command: ["--wait", "up"]

  server:
    build: ./server
    depends_on:
      - postgres
      - migrate
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/firefly
    ports:
      - "3000:3000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
