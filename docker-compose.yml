services:
  server:
    build: ./server
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/firefly
    ports:
      - "3000:3000"
    volumes:
      - ./server/log.txt:/app/log.txt

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  postgres_data:
